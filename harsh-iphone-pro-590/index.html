<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Ledger Compass Owner Access</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0a0a0f;
      color: #e8e8ed;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 24px;
    }
    main {
      width: min(420px, 100%);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 14px;
      padding: 20px;
      background: #15151c;
    }
    h1 { font-size: 20px; margin: 0 0 8px; }
    p { color: #9a9aa5; line-height: 1.5; margin: 0 0 16px; }
    button {
      width: 100%;
      min-height: 48px;
      border: 0;
      border-radius: 10px;
      background: #c9ff3d;
      color: #0a0a0f;
      font-weight: 800;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Owner access</h1>
    <p>This opens Ledger Compass with Pro enabled on this iPhone PWA. Your saved data stays on the same site storage.</p>
    <button type="button" id="openBtn">Open Ledger Compass Pro</button>
  </main>
  <script>
    function openOwnerApp() {
      localStorage.setItem('ledger_owner_pwa_unlocked_v1', 'yes');
      location.replace('../www/index.html?owner=harsh&t=' + Date.now());
    }
    document.getElementById('openBtn').addEventListener('click', openOwnerApp);
    setTimeout(openOwnerApp, 600);
  </script>
</body>
</html>
